<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yung's Art Lab | Exhibition</title>
    <meta name="description" content="Welcome to my Art Lab where oil meets acrylic, and reality blends with fantasy.">
    <meta name="keywords" content="Yung's Art Lab, berlin artist, surreal artist, oil painting, contemporary art, 藝術家, 油畫, 壓克力畫, 當代藝術, 線上畫廊">
    <meta name="author" content="Yung's Art Lab">

    <meta property="og:title" content="Yung's Art Lab | Cinematic Virtual Exhibition">
    <meta property="og:description" content="Welcome to my Art Lab where oil meets acrylic, and reality blends with fantasy.">
    <meta property="og:image" content="https://yungsartlab.github.io/All eyes on us.jpg">
    <meta property="og:url" content="https://yungsartlab.github.io/">
    <meta property="og:type" content="website">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JM5BZF9MBD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JM5BZF9MBD');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            touch-action: pan-y;
        }

        /* 左側圖片容器 */
        .slide-container {
            width: 60%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            left: 2%; 
            top: 20px; 
        }

        /* 每一幅作品的獨立群組 */
        .artwork-group {
            position: absolute;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%;
            max-width: 480px; 
            z-index: 1;
        }

        .artwork-group.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 5;
        }

        /* 3D 畫布本體 */
        .tilt-box {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            transition: transform 0.1s ease-out;
            cursor: crosshair;
            box-shadow: 0 40px 70px rgba(0,0,0,0.9);
            background-color: transparent; 
            padding: 0; 
        }

        /* 畫作圖片限制 */
        .tilt-box img {
            width: 100%;
            max-height: 68vh; 
            object-fit: contain; 
            display: block;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            user-drag: none;
            pointer-events: none;
        }

        /* 3D 前衛光影反光 */
        .glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 60%);
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .tilt-box:hover .glare {
            opacity: 1;
        }

        /* ✨ 右側資訊面板：與左邊畫作完美頂端平行與固定高度 */
        .info-panel {
            position: absolute;
            right: 10%;
            top: 16vh; 
            width: 320px;
            height: 68vh; 
            z-index: 20;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
            display: flex;
            flex-direction: column; 
        }

        .info-panel.visible {
            opacity: 1;
        }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 10px;
            color: #ffffff;
            line-height: 1.1;
            flex-shrink: 0;
        }

        .art-meta {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 25px;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        /* ✨ 右側描述欄：加上 pre-line，讓你在 HTML 裡怎麼按 Enter，網頁就怎麼換行 */
        .art-desc {
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            line-height: 1.8;
            color: #888888; 
            margin-bottom: 30px;
            overflow-y: auto; 
            padding-right: 10px;
            flex-grow: 1; 
            user-select: text; 
            -webkit-user-select: text;
            white-space: pre-line; /* 👈 關鍵：完美保留你打的段落與換行 */
        }

        /* 隱形精緻滾動條 */
        .art-desc::-webkit-scrollbar {
            width: 3px;
        }
        .art-desc::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* 詢價與 IG 導覽按鈕 */
        .buy-btn {
            display: inline-block;
            border: 1px solid #ffffff;
            padding: 14px 35px;
            color: #ffffff;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            flex-shrink: 0; 
            margin-top: auto; 
        }

        .buy-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* 隱形左右換圖點擊區 */
        .nav-zone {
            position: absolute;
            top: 0; height: 100%; width: 15%; 
            cursor: pointer; z-index: 10;
            display: flex; align-items: center;
        }
        .prev-zone { left: 0; justify-content: flex-start; padding-left: 40px;}
        .next-zone { right: 0; justify-content: flex-end; padding-right: 40px;}

        .nav-zone span { font-size: 40px; font-weight: 100; color: rgba(255,255,255,0.05); transition: 0.4s; }
        .nav-zone:hover span { color: rgba(255,255,255,0.7); }

        .counter {
            position: absolute; bottom: 40px; left: 40px;
            font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
        }

        /* 手機版響應式自動調整 */
        @media (max-width: 768px) {
            .nav-zone, .counter { display: none; } 
            .slide-container { width: 100%; left: 0; top: -5vh; }
            .artwork-group { width: 80vw; max-width: none; }
            .tilt-box { padding: 0; }
            .tilt-box img { max-height: 48vh; }
            
            .info-panel {
                right: 0; left: 0; bottom: 5%; top: auto;
                width: 100%;
                height: auto;
                text-align: center;
                padding: 0 30px;
            }
            .art-title { font-size: 32px; }
            .art-desc { display: none; }
            .buy-btn { width: 100%; padding: 12px 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>YUNG'S ART LAB</h1>
    </header>

    <main id="touch-area">
        <div class="nav-zone prev-zone" onclick="changeSlide(-1)"><span>‹</span></div>
        
        <div class="slide-container">
            
            <div class="artwork-group active" 
                 data-title="All eyes on us" 
                 data-meta="Oil on Canvas, 2026 — 40x50cm" 
                 data-desc="An influencer in the middle of the beach, a step away from being trampled by a pink elephant, yet joyfully waiting for the lady in front of her to capture the ”perfect shot.“ It’s a reflection on the phenomenon of craving for attention.

Inspired by the story of Chanchal, an elephant painted with pink powder for a commercial shoot who tragically passed away three months later.

Though her cause of death is under investigation without being directly linked to the incident, it raised a topic: animal exploitation, whether physical or mental abuse, is a pressing issue that needs attention."
                 data-ig="https://www.instagram.com/p/DZTHyEMRabd/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="All eyes on us.jpg" alt="All eyes on us 眾所矚目">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="The quiet glamour" 
                 data-meta="Acrylic, 2025 — 43.5x64cm" 
                 data-desc="An elegant capture of the night’s gentle yet steadfast light, portraying a subtle grace and comforting warmth."
                 data-ig="https://www.instagram.com/p/DQaNdUljGwr/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="The quiet glamour.jpeg" alt="The quiet glamour 靜謐風華">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="A piece of a dream" 
                 data-meta="Oil on Canvas, 2025 — 50x40cm" 
                 data-desc="It was inspired by a dream I vividly remembered. As soon as I woke up, I wrote it down before the details faded. Sometimes I have a clear visual in my mind, but translating that image onto canvas can be surprisingly challenging. To help bridge that gap, I often use real-life photos as references and try to recreate the atmosphere I saw in the dream.

What I love most about this particular piece is the way the human and the bear gaze at each other — peacefully, as if they understand one another. Through the river’s reflection, I wanted to invite you to reflect on the relationship between the two figures, and perhaps even extend that thought to our relationship with nature. While the painting has a fantastical appearance, my intention is to go beyond that — to bring in deeper meaning and emotional resonance beneath the surface."
                 data-ig="https://www.instagram.com/p/DMfRP22oAgf/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="A piece of a dream.jpeg" alt="A piece of a dream 夢境一隅">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="Family" 
                 data-meta="Acrylic, 2025 — 43.5x64cm" 
                 data-desc="Capturing life’s deepest sense of belonging and ultimate comfort, framed within rich, warm, and deeply soulful patches of color."
                 data-ig="https://www.instagram.com/p/DNWdABMoxDU/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="Family.jpeg" alt="Family 家人">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="Flower with elegant vibe" 
                 data-meta="Acrylic, 2025 — 43.5x64cm" 
                 data-desc="A contemporary reimagining of still-life florals, capturing the fluid lines and modern harmony that radiate an elegant, unique aura throughout the space."
                 data-ig="https://www.instagram.com/p/DMBSzyDgeL_/?img_index=1">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="Flower with elegant vibe.png" alt="Flower with elegant vibe 優雅花卉">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="Blooming Roses" 
                 data-meta="Acrylic, 2025 — 43.5x64cm" 
                 data-desc="Within the calm layering of deep tones, the rose forgets time—crystallizing into a silent poem, softly radiating its unique and inner light."
                 data-ig="https://www.instagram.com/p/DLvVAR7AKC8/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="Blooming Roses.png" alt="Blooming Roses 盛開的玫瑰">
                </div>
            </div>
            
            <div class="artwork-group" 
                 data-title="Fantasy of a girl in bathroom time" 
                 data-meta="Acrylic, 2025 — 43.5x64cm" 
                 data-desc="A hidden sanctuary for the self. Within a magical yet serene ambiance, pink fantasies rise as lightly as bubbles, blossoming quietly and freely in the most peaceful corner."
                 data-ig="https://www.instagram.com/p/DLGYrdCIyWb/">
                <div class="tilt-box">
                    <div class="glare"></div>
                    <img src="Fantasy of a girl in bathroom time.png" alt="Fantasy of a girl in bathroom time 女孩沐浴時光的幻想">
                </div>
            </div>
        </div>

        <div class="nav-zone next-zone" onclick="changeSlide(1)"><span>›</span></div>
    </main>

    <div class="info-panel" id="infoPanel">
        <div id="artTitle" class="art-title">All eyes on us</div>
        <div id="artMeta" class="art-meta">Oil on Canvas, 2026 — 40x50cm</div>
        <div id="artDesc" class="art-desc">
            </div>
        <div class="buy-btn" onclick="openCurrentIG()">INQUIRE / VIEW ON IG</div>
    </div>

    <div id="counter" class="counter">1 / 7</div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.artwork-group');
        const titleEl = document.getElementById('artTitle');
        const metaEl = document.getElementById('artMeta');
        const descEl = document.getElementById('artDesc'); 
        const counterEl = document.getElementById('counter');
        const infoPanel = document.getElementById('infoPanel');

        function updateLabels() {
            const currentSlide = slides[currentIdx];
            infoPanel.classList.remove('visible');
            
            setTimeout(() => {
                titleEl.textContent = currentSlide.getAttribute('data-title');
                metaEl.textContent = currentSlide.getAttribute('data-meta');
                
                // 完美保留並載入 HTML 內設定好的自訂分段
                descEl.textContent = currentSlide.getAttribute('data-desc'); 
                
                // 換圖時將滾動軸拉回最頂
                descEl.scrollTop = 0;
                
                counterEl.textContent = `${currentIdx + 1} / ${slides.length}`;
                infoPanel.classList.add('visible');
            }, 500); 
        }

        function changeSlide(direction) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + direction + slides.length) % slides.length;
            slides[currentIdx].classList.add('active');
            updateLabels();
        }

        function openCurrentIG() {
            const igLink = slides[currentIdx].getAttribute('data-ig');
            if(igLink) window.open(igLink, '_blank');
        }

        // 3D 效果
        const tiltBoxes = document.querySelectorAll('.tilt-box');
        tiltBoxes.forEach(box => {
            box.addEventListener('mousemove', (e) => {
                const rect = box.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const cx = rect.width / 2;
                const cy = rect.height / 2;
                
                const rx = ((y - cy) / cy) * -10; 
                const ry = ((x - cx) / cx) * 10;

                box.style.setProperty('--rx', `${rx}deg`);
                box.style.setProperty('--ry', `${ry}deg`);
                box.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
                box.style.setProperty('--my', `${(y / rect.height) * 100}%`);
            });

            box.addEventListener('mouseleave', () => {
                box.style.setProperty('--rx', `0deg`);
                box.style.setProperty('--ry', `0deg`);
                box.style.setProperty('--mx', `50%`);
                box.style.setProperty('--my', `50%`);
            });
        });

        // 鍵盤左右切換
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // 手機滑動
        const touchArea = document.getElementById('touch-area');
        let touchStartX = 0, touchStartY = 0;

        touchArea.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        touchArea.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const xDiff = touchEndX - touchStartX;
            const yDiff = touchEndY - touchStartY;
            
            if (Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 30) {
                if (xDiff > 0) changeSlide(-1);
                else changeSlide(1); 
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            descEl.textContent = slides[0].getAttribute('data-desc');
            infoPanel.classList.add('visible');
        });
    </script>
</body>
</html>
