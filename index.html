<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung's Art Lab | Exhibition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            /* 畫廊打光效果：模擬天花板射燈 */
            background: radial-gradient(circle at 50% 40%, #3a3a3a 0%, #0a0a0a 100%);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.7);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 畫作本體 */
        .artwork {
            max-width: 70%; 
            max-height: 75%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transform: translateY(15px);
            box-shadow: 0 35px 60px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5); 
            background-color: #fafafa; /* 畫布白邊 */
            padding: 12px; 
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* 當畫作顯示時，游標變成手指，暗示可點擊 */
        .artwork.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            cursor: pointer; 
        }

        .nav-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 25%;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
        }
        .prev-zone { left: 0; justify-content: flex-start; padding-left: 40px;}
        .next-zone { right: 0; justify-content: flex-end; padding-right: 40px;}

        .nav-zone span {
            font-size: 40px;
            font-weight: 100;
            color: rgba(255,255,255,0.1);
            transition: color 0.4s;
        }
        .nav-zone:hover span { color: rgba(255,255,255,0.7); }

        /* 實體畫廊說明牌 */
        .plaque-container {
            position: absolute;
            bottom: 60px; 
            right: 80px;
            z-index: 10;
        }

        .museum-plaque {
            background-color: #fdfdfd;
            color: #1a1a1a;
            padding: 20px 30px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.4);
            min-width: 260px;
            border-left: 2px solid #999;
            opacity: 0;
            transform: translateX(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .museum-plaque.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            font-weight: 600;
            margin-bottom: 6px;
            color: #000;
        }

        .art-meta {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #555;
            letter-spacing: 0.05em;
        }

        .art-artist {
            font-family: 'Roboto', sans-serif;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 6px;
        }
        
        /* 點擊 IG 的小提示 */
        .ig-hint {
            font-family: 'Roboto', sans-serif;
            font-size: 9px;
            color: #888;
            letter-spacing: 0.15em;
            margin-top: 10px;
        }

        .counter {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .plaque-container {
                position: relative;
                bottom: 20px;
                right: 0;
                display: flex;
                justify-content: center;
                margin-top: 30px;
            }
            .artwork { max-width: 85%; max-height: 55%; padding: 8px; }
            main { flex-direction: column; }
            .nav-zone span { font-size: 30px; }
            .counter { display: none; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>YUNG'S ART LAB</h1>
    </header>

    <main>
        <div class="nav-zone prev-zone" onclick="changeSlide(-1)">
            <span>‹</span>
        </div>
        
        <div class="slide-container">
            <img class="artwork active" onclick="openIG(this)" src="All eyes on us.jpg" alt="Artwork 1" data-title="All eyes on us" data-meta="Oil on Canvas, 2026 — 40x50cm" data-ig="https://www.instagram.com/p/DZTHyEMRabd/">
            <img class="artwork" onclick="openIG(this)" src="The quiet glamour.jpeg" alt="Artwork 2" data-title="The quiet glamour" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/p/DQaNdUljGwr/">
            <img class="artwork" onclick="openIG(this)" src="A piece of a dream.jpeg" alt="Artwork 3" data-title="A piece of a dream" data-meta="Oil on Canvas, 2025 — 50x40cm" data-ig="https://www.instagram.com/p/DMfRP22oAgf/">
            <img class="artwork" onclick="openIG(this)" src="Family.jpeg" alt="Artwork 4" data-title="Family" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/p/DNWdABMoxDU/">
            <img class="artwork" onclick="openIG(this)" src="Flower with elegant vibe.png" alt="Artwork 5" data-title="Flower with elegant vibe" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/p/DMBSzyDgeL_/?img_index=1">
            <img class="artwork" onclick="openIG(this)" src="Blooming Roses.png" alt="Artwork 6" data-title="Blooming Roses" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/p/DLvVAR7AKC8/">
            <img class="artwork" onclick="openIG(this)" src="Fantasy of a girl in bathroom time.png" alt="Artwork 7" data-title="Fantasy of a girl in bathroom time" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/p/DLGYrdCIyWb/">
        </div>

        <div class="nav-zone next-zone" onclick="changeSlide(1)">
            <span>›</span>
        </div>
    </main>

    <div class="plaque-container">
        <div class="museum-plaque" id="plaque">
            <div id="artTitle" class="art-title">All eyes on us</div>
            <div id="artMeta" class="art-meta">Oil on Canvas, 2026 — 40x50cm</div>
            <div class="art-artist">Yung's Art Lab</div>
            <div class="ig-hint">↗ CLICK ARTWORK FOR IG</div>
        </div>
    </div>

    <div id="counter" class="counter">1 / 7</div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.artwork');
        const titleEl = document.getElementById('artTitle');
        const metaEl = document.getElementById('artMeta');
        const counterEl = document.getElementById('counter');
        const plaque = document.getElementById('plaque');

        function updateLabels() {
            const currentSlide = slides[currentIdx];
            
            plaque.classList.remove('visible');
            
            setTimeout(() => {
                titleEl.textContent = currentSlide.getAttribute('data-title');
                metaEl.textContent = currentSlide.getAttribute('data-meta');
                counterEl.textContent = `${currentIdx + 1} / ${slides.length}`;
                plaque.classList.add('visible');
            }, 400); 
        }

        function changeSlide(direction) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + direction + slides.length) % slides.length;
            slides[currentIdx].classList.add('active');
            updateLabels();
        }

        // 開啟 IG 連結的功能
        function openIG(imgElement) {
            const igLink = imgElement.getAttribute('data-ig');
            if(igLink) {
                window.open(igLink, '_blank');
            }
        }

        setTimeout(() => plaque.classList.add('visible'), 100);
    </script>
</body>
</html>
