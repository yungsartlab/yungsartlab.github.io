<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUNG'S ART LAB</title>
    <style>
        /* 絕對前衛：拋棄所有多餘裝飾 */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #000000; /* 絕對純黑 */
            color: #ffffff;
            font-family: "Helvetica Neue", Arial, sans-serif; /* 現代主義無襯線字體 */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 巨型動態排版 (與圖片重疊產生負片效果) */
        .title-display {
            position: absolute;
            top: 50%;
            left: 4%;
            transform: translateY(-50%);
            font-size: 9vw;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            z-index: 10;
            mix-blend-mode: difference; /* 前衛魔法：文字疊加在圖片上會自動變色 */
            pointer-events: none; /* 讓滑鼠穿透文字點擊圖片 */
            width: 90%;
            word-wrap: break-word;
            letter-spacing: -0.02em;
        }

        .meta-display {
            position: absolute;
            bottom: 6%;
            left: 4%;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            z-index: 10;
            mix-blend-mode: difference;
            pointer-events: none;
        }

        /* 畫作展示區：打破死板的置中 */
        .gallery {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* 圖片偏右，與左側巨型文字產生張力 */
            padding-right: 8%;
        }

        .artwork {
            position: absolute;
            max-width: 65vw;
            max-height: 85vh;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.95) translateX(40px);
            transition: all 0.9s cubic-bezier(0.19, 1, 0.22, 1); /* 極度絲滑的切換曲線 */
            cursor: crosshair; /* 前衛的十字準星游標，暗示可點擊 */
            z-index: 1;
        }

        .artwork.active {
            opacity: 1;
            transform: scale(1) translateX(0);
            z-index: 5;
        }

        /* 極簡導覽介面 */
        .controls {
            position: absolute;
            bottom: 6%;
            right: 4%;
            display: flex;
            gap: 30px;
            z-index: 10;
            font-family: monospace;
            font-size: 14px;
        }

        .ctrl-btn {
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            padding-bottom: 4px;
        }

        /* 按鈕底部的懸停動效 */
        .ctrl-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 1px;
            background: #ffffff;
            transform: translateX(-101%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .ctrl-btn:hover::after { transform: translateX(0); }

        .click-hint {
            position: absolute;
            top: 4%;
            right: 4%;
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* 手機端極端排版適配 */
        @media (max-width: 768px) {
            .title-display { font-size: 15vw; top: 15%; transform: none; }
            .gallery { justify-content: center; padding-right: 0; align-items: flex-end; padding-bottom: 25%; }
            .artwork { max-width: 90vw; max-height: 60vh; }
            .controls { bottom: 6%; right: 4%; gap: 20px; }
            .meta-display { bottom: 12%; left: 4%; font-size: 11px; }
            .click-hint { display: none; }
        }
    </style>
</head>
<body>

    <div class="click-hint">CLICK IMAGE FOR INSTAGRAM ↗</div>

    <div class="title-display" id="hugeTitle"></div>
    <div class="meta-display" id="smallMeta"></div>

    <div class="gallery">
        <img class="artwork active" onclick="openIG(this)" src="All eyes on us.jpg" data-title="All eyes on us" data-meta="Oil on Canvas, 2026 — 40x50cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="The quiet glamour.jpeg" data-title="The quiet glamour" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="A piece of a dream.jpeg" data-title="A piece of a dream" data-meta="Oil on Canvas, 2025 — 50x40cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="Family.jpeg" data-title="Family" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="Flower with elegant vibe.png" data-title="Flower with elegant vibe" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="Blooming Roses.png" data-title="Blooming Roses" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/yungsartlab/">
        <img class="artwork" onclick="openIG(this)" src="Fantasy of a girl in bathroom time.png" data-title="Fantasy of a girl in bathroom time" data-meta="Acrylic, 2025 — 43.5x64cm" data-ig="https://www.instagram.com/yungsartlab/">
    </div>

    <div class="controls">
        <div class="ctrl-btn" onclick="changeSlide(-1)">PREV</div>
        <div class="ctrl-btn" onclick="changeSlide(1)">NEXT</div>
    </div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.artwork');
        const hugeTitle = document.getElementById('hugeTitle');
        const smallMeta = document.getElementById('smallMeta');

        function updateUI() {
            const currentSlide = slides[currentIdx];
            // 更新巨型文字與小標籤
            hugeTitle.textContent = currentSlide.getAttribute('data-title');
            smallMeta.textContent = currentSlide.getAttribute('data-meta');
        }

        function changeSlide(direction) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + direction + slides.length) % slides.length;
            slides[currentIdx].classList.add('active');
            updateUI();
        }

        // 點擊圖片跳轉 IG 的功能
        function openIG(imgElement) {
            const igLink = imgElement.getAttribute('data-ig');
            if(igLink) {
                window.open(igLink, '_blank');
            }
        }

        // 初始化
        updateUI();
    </script>
</body>
</html>
