    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 🎨 切換為純白當代藝廊風格 */
            background-color: #ffffff;
            color: #111111;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 0.15em;
            color: rgba(17, 17, 17, 0.8); /* 標題換成深色 */
            pointer-events: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            touch-action: pan-y;
        }

        /* 左側圖片容器 */
        .slide-container {
            width: 60%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            left: 2%; 
            top: 20px; 
        }

        /* 每一幅作品的獨立群組 */
        .artwork-group {
            position: absolute;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%;
            max-width: 480px; 
            z-index: 1;
        }

        .artwork-group.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 5;
        }

        /* 3D 畫布本體 */
        .tilt-box {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            transition: transform 0.1s ease-out;
            cursor: crosshair;
            /* 調整陰影顏色，在白底下看起來更柔和真實 */
            box-shadow: 0 30px 50px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.1);
            background-color: #111111; /* 🎨 改為黑框，完美與白背景區隔開來 */
            padding: 12px; 
        }
