<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yung's Art Lab | Exhibition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            /* 畫廊打光效果：模擬天花板射燈 */
            background: radial-gradient(circle at 50% 40%, #3a3a3a 0%, #0a0a0a 100%);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.7);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* ⚠️ 新增：防止瀏覽器預設的滑動行為（如縮放）干擾 */
            touch-action: pan-y;
        }

        /* 畫作本體 */
        .artwork {
            max-width: 70%; 
            max-height: 75%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transform: translateY(15px);
            box-shadow: 0 35px 60px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5); 
            background-color: #fafafa; /* 畫布白邊 */
            padding: 12px; 
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* 當畫作顯示時，游標變成手指，暗示可點擊 */
        .artwork.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            cursor: pointer; 
        }

        /* ❌ 移除：原本的左右點擊換畫區樣式 */
        /* .nav-zone { ... } */
        /* .nav-zone span { ... } */

        /* 實體畫廊說明牌 */
        .plaque-container {
            position: absolute;
            bottom: 60px; 
            right: 80px;
            z-index: 10;
        }

        .museum-plaque {
            background-color: #fdfdfd;
            color: #1a1a1a;
            padding: 20px 30px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.4);
            min-width: 260px;
            border-left: 2px solid #999;
            opacity: 0;
            transform: translateX(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .museum-plaque.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            font-weight: 600;
            margin-bottom: 6px;
            color: #000;
        }

        .art-meta {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #555;
            letter-spacing: 0.05em;
        }

        .art-artist {
            font-family: 'Roboto', sans-serif;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 15px;
            border-top: 1px solid #ddd;
            padding-top: 6px;
        }
        
        /* 點擊 IG 的小提示 */
        .ig-hint {
            font-family: 'Roboto', sans-serif;
            font-size: 9px;
            color: #888;
            letter-spacing: 0.15em;
            margin-top: 10px;
        }

        .counter {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .plaque-container {
                position: relative;
                bottom: 20px;
                right: 0;
                display: flex;
                justify-content: center;
                margin-top: 30px;
            }
            .artwork { max-width: 85%; max-height: 55%; padding: 8px; }
            main { flex-direction: column; }
            /* ❌ 移除：手機端導覽樣式 */
            /* .nav-zone span { font-size: 30px; } */
            .counter { display: none; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>YUNG'S ART LAB</h1>
    </header>

    <main>
        <div class="slide-container" id="gallery-container">
