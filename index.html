    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 40%, #2a2a2a 0%, #050505 100%);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            touch-action: pan-y;
        }

        /* 左側圖片容器：安全偏移 20px 避開標題 */
        .slide-container {
            width: 60%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            left: 2%; 
            top: 20px; 
        }

        /* 每一幅作品的獨立群組（大圖） */
        .artwork-group {
            position: absolute;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%;
            max-width: 480px; /* 大氣、飽滿的視覺規格 */
            z-index: 1;
        }

        .artwork-group.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 5;
        }

        /* 3D 畫布本體 */
        .tilt-box {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
            transition: transform 0.1s ease-out;
            cursor: crosshair;
            box-shadow: 0 35px 60px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            background-color: #fafafa;
            padding: 12px; /* 高質感的實體白畫框厚度 */
        }

        /* 畫作圖片限制：維持最棒的看圖比例 */
        .tilt-box img {
            width: 100%;
            max-height: 68vh; 
            object-fit: contain; 
            display: block;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            user-drag: none;
            pointer-events: none;
        }

        /* 3D 前衛光影反光 */
        .glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%);
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .tilt-box:hover .glare {
            opacity: 1;
        }

        /* 右側：現代電商風格資訊面板 */
        .info-panel {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-45%);
            width: 320px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .info-panel.visible {
            opacity: 1;
            transform: translateY(-50%);
        }
