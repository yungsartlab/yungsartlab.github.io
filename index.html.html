<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUNG'S ART LAB | Gallery</title>
    <style>
        /* 1. 基础电影感胶片调色配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0b0b0b; /* 极深的美术馆暗房调 */
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        /* 2. 顶部极简导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            z-index: 10;
        }

        h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #ffffff;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.15em;
            transition: color 0.4s ease;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* 3. 核心：电影全屏舞台 */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 60vh;
        }

        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .artwork {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8); /* 模拟画廊射灯阴影 */
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            position: absolute;
            pointer-events: none;
        }

        .artwork.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* 4. 左右隐形/半透明电影切场按钮 */
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            width: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            color: rgba(255,255,255,0);
            font-size: 24px;
            font-weight: 200;
            transition: all 0.4s ease;
        }

        .prev-btn { left: 0; }
        .next-btn { right: 0; }

        /* 鼠标悬停时才隐约显现，保持画面纯净 */
        .nav-btn:hover {
            color: rgba(255,255,255,0.4);
            background: linear-gradient(to var(--direction, right), rgba(0,0,0,0.2), transparent);
        }
        .prev-btn { --direction: right; }
        .next-btn { --direction: left; }

        /* 5. 底部画廊标签（Label）*/
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .art-title {
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: #ffffff;
            font-style: italic; /* 画廊惯用斜体作品名 */
        }

        .art-meta {
            font-size: 11px;
            color: #666666;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .counter {
            font-size: 12px;
            color: #444444;
            font-family: monospace;
            letter-spacing: 0.1em;
        }

        /* 手机端适配响应式 */
        @media (max-width: 768px) {
            body { padding: 20px; }
            h1 { font-size: 12px; }
            .artwork { max-width: 95%; max-height: 75%; }
            .nav-btn { width: 20%; color: rgba(255,255,255,0.2); }
            footer { flex-direction: column; align-items: flex-start; gap: 15px; }
            .counter { align-self: flex-end; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Yung's Art Lab</h1>
        <nav>
            <a href="https://www.instagram.com/yungsartlab/" target="_blank">INSTAGRAM</a>
        </nav>
    </header>

    <main>
        <div class="prev-btn nav-btn" onclick="changeSlide(-1)">—</div>
        
        <div class="slide-container">
            <!-- ⚠️ 在这里替换你自己的画作图片链接 ⚠️ -->
            <!-- 你可以用你托管在网上的图片URL，这里我先用精选的高清艺术画占位 -->
            <img class="artwork active" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1200" alt="Artwork 1" data-title="Whisper of Silence" data-meta="Oil on Canvas, 2026 — 120x150cm">
            <img class="artwork" src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=1200" alt="Artwork 2" data-title="Nebula Laboratory" data-meta="Mixed Media, 2025 — 100x100cm">
            <img class="artwork" src="https://images.unsplash.com/photo-1549887534-1541e9326642?q=80&w=1200" alt="Artwork 3" data-title="Fragments of Time" data-meta="Acrylic, 2026 — 80x100cm">
        </div>

        <div class="next-btn nav-btn" onclick="changeSlide(1)">+</div>
    </main>

    <footer>
        <div class="info-block">
            <div id="artTitle" class="art-title">Whisper of Silence</div>
            <div id="artMeta" class="art-meta">Oil on Canvas, 2026 — 120x150cm</div>
        </div>
        <div id="counter" class="counter">01 / 03</div>
    </footer>

    <script>
        // 6. 核心交互：控制电影感淡入淡出与标签切换
        let currentIdx = 0;
        const slides = document.querySelectorAll('.artwork');
        const titleEl = document.getElementById('artTitle');
        const metaEl = document.getElementById('artMeta');
        const counterEl = document.getElementById('counter');

        function updateLabels() {
            const currentSlide = slides[currentIdx];
            
            // 文本信息优雅更新
            titleEl.textContent = currentSlide.getAttribute('data-title');
            metaEl.textContent = currentSlide.getAttribute('data-meta');
            
            // 计数器更新 (例如: 01 / 03)
            const total = slides.length;
            counterEl.textContent = `${String(currentIdx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
        }

        function changeSlide(direction) {
            // 隐藏当前图片
            slides[currentIdx].classList.remove('active');
            
            // 计算下一张图片的索引
            currentIdx = (currentIdx + direction + slides.length) % slides.length;
            
            // 显示下一张图片
            slides[currentIdx].classList.add('active');
            
            // 更新下方画廊标签内容
            updateLabels();
        }

        // 初始化
        updateLabels();
    </script>
</body>
</html>
